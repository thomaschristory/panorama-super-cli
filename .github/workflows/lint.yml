name: lint

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: lint/format/type-check and the AGENTS.md freshness check
# only need to read the checked-out tree.
permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install 3.12
      - name: Sync deps
        run: uv sync --frozen
      - name: Ruff check
        run: uv run ruff check psc tests
      - name: Ruff format
        run: uv run ruff format --check psc tests
      - name: Mypy strict
        run: uv run mypy --strict psc

  agents-md-fresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install 3.12
      - name: Sync deps
        run: uv sync --frozen
      - name: Check AGENTS.md is in sync with CLAUDE.md
        run: uv run python scripts/sync_agents_md.py --check
