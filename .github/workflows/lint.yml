name: lint

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: lint/format/type-check and the AGENTS.md freshness check
# only need to read the checked-out tree.
permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install 3.12
      - name: Sync deps
        run: uv sync --frozen
      - name: Ruff check
        run: uv run ruff check psc tests
      - name: Ruff format
        run: uv run ruff format --check psc tests
      - name: Mypy strict
        run: uv run mypy --strict psc

  agents-md-fresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install 3.12
      - name: Sync deps
        run: uv sync --frozen
      - name: Check AGENTS.md is in sync with CLAUDE.md
        run: uv run python scripts/sync_agents_md.py --check
