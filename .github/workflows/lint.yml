name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install 3.12
      - name: Sync deps
        run: uv sync --frozen
      - name: Ruff check
        run: uv run ruff check psc tests
      - name: Ruff format
        run: uv run ruff format --check psc tests
      - name: Mypy strict
        run: uv run mypy --strict psc

  agents-md-fresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install 3.12
      - name: Sync deps
        run: uv sync --frozen
      - name: Check AGENTS.md is in sync with CLAUDE.md
        run: uv run python scripts/sync_agents_md.py --check
